<!DOCTYPE html>
<html lang="en">
<head>
 <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
 <style>/* Reset default browser styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* Body styling */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* Main container */
.container {
    background: #ffffff;
    padding: 30px;
    width: 400px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    text-align: center;
}

/* Heading */
.container h2 {
    margin-bottom: 20px;
    color: #333;
}

/* Textarea */
textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    resize: none;
    font-size: 14px;
    margin-bottom: 15px;
    transition: 0.3s;
}

textarea:focus {
    border-color: #667eea;
    outline: none;
    box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #667eea;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}

/* Result text */
h3 {
    margin-top: 20px;
    font-weight: bold;
    color: #444;
}</style>
</head>

<body>
   <div class="container">
<h2>AI Phishing Detector</h2>
<form method="POST">
<textarea name="message" placeholder="Paste suspicious message here" required
style="width:100%;height:100px;"></textarea>
<button type="submit">Check</button>
</form>

<h3>{{result}}</h3>
</div>


</body>
</html>
