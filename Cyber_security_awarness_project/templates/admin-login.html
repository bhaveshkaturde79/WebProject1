<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
/* ===== General Page Styles ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== Login Form Container ===== */
form {
    background: white;
    padding: 40px 50px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    width: 350px;
    text-align: center;
}

/* ===== Heading ===== */
h2 {
    margin-bottom: 30px;
    color: #333;
    font-size: 28px;
    font-weight: 600;
    text-align: center;
}

/* ===== Input Fields ===== */
input[type="text"],
input[type="password"] {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0 20px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

input[type="text"]:focus,
input[type="password"]:focus {
    border-color: #4facfe;
    box-shadow: 0 0 8px rgba(79, 172, 254, 0.5);
    outline: none;
}
.page-title {
  position: fixed;      /* Fix position so it stays visible on scroll */
  top: 30px;            /* Distance from top */
  left: 50%;            /* Center horizontally */
  transform: translateX(-50%); /* Offset to center */
  font-size: 28px;
  font-weight: 600;
  color: #333;
  margin: 0;
  z-index: 10;
  text-align: center;
}

/* ===== Submit Button ===== */
button {
    width: 100%;
    padding: 12px 0;
    background: #4facfe;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
}

button:hover {
    background: #00f2fe;
    transform: scale(1.05);
}

/* ===== Small Responsive Touch ===== */
@media(max-width: 400px){
    form {
        width: 90%;
        padding: 30px 20px;
    }
}
</style>

</head>
<body>
    <!-- <h2 class="page-title">Admin Login</h2> -->
    <form method="POST">
        <h2>Admin Login</h2>
        <label>Username:</label><br>
        <input type="text" name="username" required><br><br>
        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>
        <button type="submit">Login</button>
    </form>
</body>
</html>
